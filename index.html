<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 min-h-screen">
    <div class="max-w-[1200px] mx-auto p-6 md:p-8">
        <h1 class="text-2xl font-bold mb-6">Job Application Tracker</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-lg shadow-sm">
                <p class="text-sm font-medium text-gray-500 mb-2">All Jobs</p>
                <p class="text-2xl font-bold text-[#1e3a8a]" id="all-count">0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm">
                <p class="text-sm text-2xl font-bold mb-6font-medium text-gray-500 mb-2">Interview</p>
                <p class="text-2xl font-bold text-[#059669]" id="i-count">0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm">
                <p class="text-sm font-medium text-gray-500 mb-2">Rejected</p>
                <p class="text-2xl font-bold text-[#dc2626]" id="r-count">0</p>
            </div>
        </div>
    </div>
    <div class="max-w-[1200px] mx-auto p-6 md:p-8">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-lg font-bold">Available Jobs</h3>
            <p class="text-sm text-gray-500"><span id="all-count">0</span>jobs</p>
        </div>
        <div class="flex gap-2 mb-6" id="tabs-container">
            <button
                class="job-tab active px-4 py-1.5 text-xs font-semibold rounded-md bg-[#3b82f6] text-white transition-colors"
                data-tab="All">All</button>
            <button
                class="job-tab px-4 py-1.5 text-xs font-semibold rounded-md bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 transition-colors"
                data-tab="Interview">Interview</button>
            <button
                class="job-tab px-4 py-1.5 text-xs font-semibold rounded-md bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 transition-colors"
                data-tab="Rejected">Rejected</button>
        </div>

        <div id="job-container" class="space-y-4">
        </div>

        <div id="empty-state"
            class="hidden bg-white rounded-lg shadow-sm p-16 flex flex-col items-center justify-center text-center">
            <div class="mb-4 text-[#60a5fa]">
                <img src="jobs.png" alt="jobs image">
            </div>
            <h4 class="text-xl font-bold text-[#1e3a8a] mb-2">No jobs available</h4>
            <p class="text-sm text-gray-500">Check back soon for new job opportunities</p>
        </div>

    </div>

    <script src="scripts.js"></script>
</body>

</html>
